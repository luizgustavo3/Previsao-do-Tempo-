<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previsão do Tempo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="container">

    <h1 class="titulo">🌤 Previsão do Tempo</h1>

    <div class="busca">
      <input type="text" id="inputCidade" placeholder="Digite uma cidade..." />
      <button id="btnBuscar">
        <i class="fas fa-search"></i> Buscar
      </button>
    </div>

    <div class="card" id="card" style="display:none">
      <div class="cidade-info">
        <h2 id="nomeCidade">--</h2>
        <p id="pais">--</p>
      </div>
      <div class="temp-info">
        <img id="icone" src="" alt="ícone clima" />
        <h1 id="temperatura">--°C</h1>
      </div>
      <p id="descricao">--</p>
      <div class="detalhes">
        <div class="detalhe">
          <i class="fas fa-droplet"></i>
          <span id="umidade">--%</span>
          <small>Umidade</small>
        </div>
        <div class="detalhe">
          <i class="fas fa-wind"></i>
          <span id="vento">-- km/h</span>
          <small>Vento</small>
        </div>
        <div class="detalhe">
          <i class="fas fa-temperature-half"></i>
          <span id="sensacao">--°C</span>
          <small>Sensação</small>
        </div>
      </div>
    </div>

    <div class="erro" id="erro" style="display:none">
      <i class="fas fa-triangle-exclamation"></i>
      <p>Cidade não encontrada. Tente novamente.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
